<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/table.css">
    <link rel="stylesheet" href="/css/gallery.css">
    <link rel="stylesheet" href="/css/modal.css">
</head>
<body>
<div id="app">

    <!-- ── Navbar ── -->
    <nav id="navbar">
        <h1>📚 Biblioteca</h1>
        <button id="btn-settings" data-i18n="btn_settings"></button>
        <button id="btn-manage-tags" data-i18n="btn_tags"></button>
        <button id="btn-dark-toggle" data-i18n="btn_theme"></button>
        <select id="lang-select" title="Idioma / Language">
            <option value="ca">Català</option>
            <option value="es">Español</option>
            <option value="en">English</option>
        </select>
        <span id="db-stats"></span>
    </nav>

    <!-- ── Sidebar ── -->
    <aside id="sidebar">
        <h3 data-i18n="shelves_title"></h3>
        <button class="btn-add-shelf" id="btn-add-shelf" data-i18n="btn_add_shelf"></button>
        <ul id="shelf-list"></ul>
    </aside>

    <!-- ── Main ── -->
    <main id="main">

        <!-- Toolbar -->
        <div id="toolbar">
            <input id="search-bar" type="text" data-i18n-placeholder="search_placeholder" placeholder="">
            <button id="btn-new-book" class="btn-primary" data-i18n="btn_new_book"></button>
            <button id="btn-toggle-view" data-i18n="btn_gallery"></button>
            <button id="btn-filter-toggle" data-i18n="btn_filters_open"></button>
        </div>

        <!-- Filter panel -->
        <div id="filter-panel">
            <form id="filter-form">
                <div>
                    <label data-i18n="filter_author"></label>
                    <input type="text" name="author" data-i18n-placeholder="filter_author" placeholder="">
                </div>
                <div>
                    <label data-i18n="filter_year_from"></label>
                    <input type="number" name="yearMin" data-i18n-placeholder="filter_year_from_ph" placeholder="">
                </div>
                <div>
                    <label data-i18n="filter_year_to"></label>
                    <input type="number" name="yearMax" data-i18n-placeholder="filter_year_to_ph" placeholder="">
                </div>
                <div>
                    <label data-i18n="filter_rating_min"></label>
                    <input type="number" name="ratingMin" step="0.1" min="0" max="10">
                </div>
                <div>
                    <label data-i18n="filter_rating_max"></label>
                    <input type="number" name="ratingMax" step="0.1" min="0" max="10">
                </div>
                <div>
                    <label data-i18n="filter_price_min"></label>
                    <input type="number" name="priceMin" step="0.01" min="0">
                </div>
                <div>
                    <label data-i18n="filter_price_max"></label>
                    <input type="number" name="priceMax" step="0.01" min="0">
                </div>
                <div>
                    <label data-i18n="filter_read_status"></label>
                    <select name="read">
                        <option value="" data-i18n="filter_any"></option>
                        <option value="true" data-i18n="filter_read"></option>
                        <option value="false" data-i18n="filter_unread"></option>
                    </select>
                </div>
                <div>
                    <label data-i18n="filter_tag"></label>
                    <select name="tagId" id="filter-tag">
                        <option value="" data-i18n="filter_all_tags"></option>
                    </select>
                </div>
                <div>
                    <label data-i18n="filter_publisher"></label>
                    <input type="text" name="editorial">
                </div>
                <div>
                    <label data-i18n="filter_series"></label>
                    <input type="text" name="serie">
                </div>
                <div>
                    <label data-i18n="filter_format"></label>
                    <input type="text" name="format">
                </div>
                <div>
                    <label data-i18n="filter_language"></label>
                    <input type="text" name="idioma">
                </div>
                <div class="filter-actions">
                    <button type="submit" class="btn-primary" data-i18n="btn_apply"></button>
                    <button type="button" id="btn-clear-filters" data-i18n="btn_clear"></button>
                </div>
            </form>
        </div>

        <!-- Table view -->
        <div id="table-view">
            <table id="book-table">
                <thead>
                    <tr>
                        <th></th>
                        <th data-i18n="col_title"></th>
                        <th data-i18n="col_author"></th>
                        <th data-i18n="col_year"></th>
                        <th data-i18n="col_rating"></th>
                        <th data-i18n="col_price"></th>
                        <th data-i18n="col_read"></th>
                        <th data-i18n="col_isbn"></th>
                        <th data-i18n="col_loan"></th>
                    </tr>
                </thead>
                <tbody id="book-tbody"></tbody>
            </table>
        </div>

        <!-- Gallery view -->
        <div id="gallery-view" style="display:none">
            <div id="gallery-grid" class="gallery-grid zoom-md"></div>
        </div>

        <!-- Pagination -->
        <div id="pagination"></div>

    </main>
</div>

<!-- Detail/edit modal (populated by JS) -->
<div id="detail-modal"></div>

<!-- Scripts: i18n must be first -->
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>
<script src="/js/books.js"></script>
<script src="/js/bookDetail.js"></script>
<script src="/js/shelves.js"></script>
<script src="/js/tags.js"></script>
<script src="/js/main.js"></script>

<script>
    document.getElementById('btn-filter-toggle').addEventListener('click', () => {
        const p = document.getElementById('filter-panel');
        p.classList.toggle('open');
        document.getElementById('btn-filter-toggle').textContent =
            p.classList.contains('open') ? t('btn_filters_close') : t('btn_filters_open');
    });
</script>
</body>
</html>
